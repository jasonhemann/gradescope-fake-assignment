repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format (check)
        entry: uv run --python 3.13 ruff format --check src tests
        language: system
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: uv run --python 3.13 ruff check src tests
        language: system
        pass_filenames: false
      - id: basedpyright
        name: basedpyright
        entry: uv run --python 3.13 basedpyright
        language: system
        pass_filenames: false
